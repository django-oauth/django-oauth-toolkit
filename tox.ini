[tox]
# Environment naming conventions:
# - Test envs: py{python}-dj{django}-{db}[{-db-topology}]
# - Migration envs: migrations-dj{django}-{db}[{-db-topology}]
# - Scenario envs: scenario-{name}-dj{django}-{db}[{-db-topology}]
# - DB tokens are terse engine/version identifiers:
#   - lite3 for SQLite 3
#   - pg16 for PostgreSQL 16
#   - my84 for MySQL 8.4
# - Database topology:
#   - standalone is the default when no db-topology suffix is present
#   - pr for primary/replica
#   - mm for multi-master variants when supported
# Examples:
#   - py312-dj52-lite3
#   - py314-dj60-pg16
#   - py314-dj60-pg16-pr
#   - py314-dj60-my84-mm
#   - migrations-dj52-my84
envlist =
    migrations-dj52-lite3,
    scenario-migrate-swapped-dj52-lite3,
    docs,
    lint,
    sphinxlint,
    py{310,311,312}-dj42-lite3,
    py{310,311,312,313}-dj50-lite3,
    py{310,311,312,313}-dj51-lite3,
    py{310,311,312,313,314}-dj52-lite3,
    py{312,313,314}-dj60-lite3,
    py{312,313,314}-djmain-lite3,
    py312-dj42-multi-db,

[testenv]
commands =
    pytest {posargs}
    coverage report
    coverage xml
extras = test
setenv =
    DJANGO_SETTINGS_MODULE = tests.settings
    PYTHONPATH = {toxinidir}
    PYTHONWARNINGS = all
deps =
    dj42: Django>=4.2,<4.3
    dj50: Django>=5.0,<5.1
    dj51: Django>=5.1,<5.2
    dj52: Django>=5.2,<6.0
    dj60: Django>=6.0,<6.1
    djmain: https://github.com/django/django/archive/main.tar.gz
passenv =
    PYTEST_ADDOPTS
    POSTGRES_*
    MYSQL_*

[testenv:py{310,311,312,313,314}-djmain-lite3]
ignore_errors = true
ignore_outcome = true

[testenv:sphinxlint]
deps = sphinx-lint
skip_install = True
commands =
    sphinx-lint docs/

[testenv:{docs,livedocs}]
basepython = python3.14
changedir = docs
allowlist_externals = make
commands =
    docs: make html
    livedocs: make livehtml
extras = docs
deps =
    livedocs: sphinx-autobuild

[testenv:lint]
basepython = python3.14
deps = ruff>=0.6
skip_install = True
commands =
    ruff format --check
    ruff check

[testenv:.migrations-base]
setenv =
    PYTHONPATH = {toxinidir}
    PYTHONWARNINGS = all
commands =
    python -c "import django; django.setup(); from django.db import connections; c=connections['default']; c.ensure_connection(); c.close()"
    django-admin makemigrations --dry-run --check

[testenv:migrations-dj52-lite3]
setenv =
    DJANGO_SETTINGS_MODULE = tests.mig_settings
    {[testenv:.migrations-base]setenv}
commands = {[testenv:.migrations-base]commands}

[testenv:migrations-dj{42,52,60}-pg16]
setenv =
    DJANGO_SETTINGS_MODULE = tests.postgres_mig_settings
    {[testenv:.migrations-base]setenv}
commands = {[testenv:.migrations-base]commands}
deps =
    {[testenv]deps}
    psycopg[binary]>=3.2

[testenv:migrations-dj{42,52,60}-pg16-pr]
setenv =
    DJANGO_SETTINGS_MODULE = tests.postgres_pr_mig_settings
    {[testenv:.migrations-base]setenv}
commands = {[testenv:.migrations-base]commands}
deps =
    {[testenv]deps}
    psycopg[binary]>=3.2

[testenv:migrations-dj{42,52,60}-my84]
setenv =
    DJANGO_SETTINGS_MODULE = tests.mysql_mig_settings
    {[testenv:.migrations-base]setenv}
commands = {[testenv:.migrations-base]commands}
deps =
    {[testenv]deps}
    PyMySQL>=1.1

[testenv:migrations-dj{42,52,60}-my84-pr]
setenv =
    DJANGO_SETTINGS_MODULE = tests.mysql_pr_mig_settings
    {[testenv:.migrations-base]setenv}
commands = {[testenv:.migrations-base]commands}
deps =
    {[testenv]deps}
    PyMySQL>=1.1

[testenv:py312-dj42-multi-db]
setenv =
    DJANGO_SETTINGS_MODULE = tests.multi_db_settings
    PYTHONPATH = {toxinidir}
    PYTHONWARNINGS = all

[testenv:{py310-dj42,py312-dj52,py314-dj60}-pg16]
setenv =
    DJANGO_SETTINGS_MODULE = tests.postgres_settings
    PYTHONPATH = {toxinidir}
    PYTHONWARNINGS = all
deps =
    {[testenv]deps}
    psycopg[binary]>=3.2

[testenv:{py310-dj42,py312-dj52,py314-dj60}-pg16-pr]
setenv =
    DJANGO_SETTINGS_MODULE = tests.postgres_pr_settings
    PYTHONPATH = {toxinidir}
    PYTHONWARNINGS = all
deps =
    {[testenv]deps}
    psycopg[binary]>=3.2

[testenv:{py310-dj42,py312-dj52,py314-dj60}-my84]
setenv =
    DJANGO_SETTINGS_MODULE = tests.mysql_settings
    PYTHONPATH = {toxinidir}
    PYTHONWARNINGS = all
deps =
    {[testenv]deps}
    PyMySQL>=1.1

[testenv:{py310-dj42,py312-dj52,py314-dj60}-my84-pr]
setenv =
    DJANGO_SETTINGS_MODULE = tests.mysql_pr_settings
    PYTHONPATH = {toxinidir}
    PYTHONWARNINGS = all
deps =
    {[testenv]deps}
    PyMySQL>=1.1

[testenv:scenario-migrate-swapped-dj52-lite3]
setenv =
    DJANGO_SETTINGS_MODULE = tests.settings_swapped
    PYTHONPATH = {toxinidir}
    PYTHONWARNINGS = all
commands =
    django-admin migrate
    django-admin makemigrations --dry-run --check

[testenv:e2e]
# Specification-organized end-to-end / compliance suite. Boots the real
# tests/app/idp Django project as a live server and drives every supported
# OAuth/OIDC flow over HTTP with a Python relying-party client; the browser
# layer additionally drives the real SvelteKit RP through Chromium (skipped
# automatically when Node/Playwright are unavailable). Emits a JUnit report and
# a compliance matrix under tests/e2e/reports/.
#
# Run the whole suite:            tox -e e2e
# One specification:              tox -e e2e -- -m spec_rfc7636
# Skip deprecated/browser flows:  tox -e e2e -- -m "not deprecated and not browser"
description = OAuth/OIDC end-to-end compliance suite (live IdP + RP)
extras = test
deps =
    playwright
    pytest-playwright
    django-environ
    django-cors-headers
    whitenoise
setenv =
    PYTHONPATH = {toxinidir}
    COMPLIANCE_MATRIX_DIR = {env:COMPLIANCE_MATRIX_DIR:{toxinidir}/tests/e2e/reports}
passenv =
    PLAYWRIGHT_BROWSERS_PATH
    PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD
    E2E_CHROMIUM_PATH
allowlist_externals =
    npm
commands_pre =
    # Best-effort browser + RP setup; ignore failures so the protocol suite
    # still runs where a browser/Node toolchain is unavailable (browser tests
    # then skip themselves).
    - python -m playwright install --with-deps chromium
    - npm install --prefix tests/app/rp
commands =
    pytest tests/e2e --confcutdir=tests/e2e -o addopts= --junitxml={env:COMPLIANCE_MATRIX_DIR:{toxinidir}/tests/e2e/reports}/junit-e2e.xml {posargs}

[testenv:build]
deps =
    build
    twine
allowlist_externals = rm
commands =
    rm -rf dist
    python -m build
    twine check dist/*
